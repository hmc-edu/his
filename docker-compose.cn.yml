services:
  mysql:
    image: m.daocloud.io/docker.io/library/mysql:8.0
    container_name: his-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: his
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - his-mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  # 前置条件：管理员需先把 GHCR 包设为 Public
  # https://github.com/orgs/hmc-edu/packages/container/his-backend/settings
  # https://github.com/orgs/hmc-edu/packages/container/his-frontend/settings
  # 如果想用 Aliyun ACR / DaoCloud 中转，参见 docs/05-国内网络优化.md
  backend:
    image: ghcr.io/hmc-edu/his-backend:latest
    container_name: his-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/his?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"

  frontend:
    image: ghcr.io/hmc-edu/his-frontend:latest
    container_name: his-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8000:80"

volumes:
  his-mysql-data:
