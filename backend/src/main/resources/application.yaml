spring:
  profiles:
    active: dev
  application:
    name: his
mybatis:
  mapper-locations: classpath:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.hmc.his.model
server:
  port: 8080
springdoc:
  swagger-ui:
    path: /swagger-ui.html
sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
